<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Roxy's Magic Reels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a0a2e;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
    #loading {
      position: absolute;
      color: #d4a0ff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 24px;
      text-align: center;
    }
    #loading .bar {
      width: 200px;
      height: 6px;
      background: #2a1a4e;
      border-radius: 3px;
      margin-top: 12px;
    }
    #loading .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #9b59b6, #f1c40f);
      border-radius: 3px;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div>Loading Roxy's Magic Reels...</div>
    <div class="bar"><div class="fill" id="load-fill"></div></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
